name: YAMLResume
description: 'YAMLResume: resumes as code in YAML'
author: YAMLResume (https://yamlresume.dev)

branding:
  icon: layout
  color: gray-dark

inputs:
  resumes:
    description: Newline-separated list of resume YAML files to build
    required: true
  no-validate:
    description: Skip schema validation
    required: false
    default: false
  no-pdf:
    description: Skip PDF generation (generate only LaTeX)
    required: false
    default: false
  verbose:
    description: Enable verbose output
    required: false
    default: false
  version:
    description: YAMLResume Docker image version
    required: false
    default: v0.11.2

outputs:
  pdf-files:
    description: Newline-separated list of generated PDF files
    value: ${{ steps.build.outputs.pdf-files }}
  tex-files:
    description: Newline-separated list of generated LaTeX files
    value: ${{ steps.build.outputs.tex-files }}
  html-files:
    description: Newline-separated list of generated HTML files
    value: ${{ steps.build.outputs.html-files }}
  md-files:
    description: Newline-separated list of generated Markdown files
    value: ${{ steps.build.outputs.md-files }}

runs:
  using: composite
  steps:
    - name: Check Docker availability
      shell: bash
      run: |
        if ! command -v docker &> /dev/null; then
          echo "::error::Docker is not available. This action requires Docker to run."
          exit 1
        fi

    - name: Pull YAMLResume Docker image
      shell: bash
      run: |
        echo "Pulling ghcr.io/yamlresume/yamlresume:${{ inputs.version }}..."
        docker pull ghcr.io/yamlresume/yamlresume:${{ inputs.version }}

    - name: Build resumes
      id: build
      shell: bash
      env:
        INPUT_RESUMES: ${{ inputs.resumes }}
        INPUT_NO_VALIDATE: ${{ inputs.no-validate }}
        INPUT_NO_PDF: ${{ inputs.no-pdf }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        bash "${{ github.action_path }}/scripts/build.sh"
